<!DOCTYPE html>
<html>

<head>
    <title>Stealth Blocker</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --muted: #666;
            --accent: #d33;
            --card: #f5f5f5;
            --border: #e0e0e0;
        }
        body.dark {
            --bg: #1e1e1e;
            --fg: #f0f0f0;
            --muted: #aaa;
            --accent: #ff6464;
            --card: #2a2a2a;
            --border: #3a3a3a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--fg);
            padding: 14px;
            min-width: 240px;
            margin: 0;
        }
        h1 {
            font-size: 15px;
            margin: 0 0 10px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .stat {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat .num {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }
        .stat .lbl {
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
        }
        label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            margin: 8px 0;
        }
        button {
            display: block;
            width: 100%;
            margin-top: 6px;
            padding: 7px;
            background: var(--card);
            color: var(--fg);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        button:hover {
            border-color: var(--accent);
        }
        #message {
            margin-top: 8px;
            font-size: 12px;
            color: var(--accent);
            min-height: 16px;
        }
    </style>
</head>

<body id="popupBody">
    <h1>Ad & Tracker Blocker</h1>

    <div class="status-row">
        <span>Status: <strong id="status">Enabled</strong></span>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="num" id="tabCount">0</div>
            <div class="lbl">This page</div>
        </div>
        <div class="stat">
            <div class="num" id="todayCount">0</div>
            <div class="lbl">Today</div>
        </div>
        <div class="stat">
            <div class="num" id="totalCount">0</div>
            <div class="lbl">All time</div>
        </div>
    </div>

    <label><input type="checkbox" id="pauseToggle"> Pause protection</label>
    <button id="whitelistCurrent">Whitelist this site</button>
    <button id="openOptions">Full settings</button>

    <div id="message"></div>

    <script src="popup.js"></script>
</body>

</html>
